name: CI Pipeline

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Extract branch name
      shell: bash
      run: echo "branch=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" >> $GITHUB_OUTPUT
      id: extract_branch
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install poetry
        poetry version "$(poetry version -s).$PATCH_NUMBER"
        poetry install -v
      env:
        PATCH_NUMBER: ${{ github.run_number }}
    - name: Build
      run: |
        poetry build
    - name: Lint
      run: |
        poetry run poe lint
    - name: Test
      run: |
        poetry run poe unit_test
    - name: Store build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/**
    - name: Restore database
      id: restore-database 
      uses: actions/cache/restore@v4
      with:
        key: ${{ steps.extract_branch.outputs.branch }}.${{ github.sha }}.db
        restore-keys: |
          ${{ steps.extract_branch.outputs.branch }}.
        path: |
          ~/.vulndb/vuln.db
    - name: Test database
      id: test-database
      if: ${{ steps.restore-database.outputs.cache-hit == 'true' }}
      continue-on-error: true
      run: |
        poetry run poe data_validation_test
    - name: Delete failed db instance
      id: delete-database
      if: steps.test-database.outcome == 'failure'
      run: rm ~/.vulndb/vuln.db
    - name: Create database
      if: ${{ (github.event_name == 'workflow_dispatch') && ((steps.restore-database.outputs.cache-hit != 'true') || (steps.test-database.outcome == 'failure' ) ) }}
      run: |
        poetry run vulndb admin create
    - name: Build database
      if: ${{ github.event_name == 'workflow_dispatch' }}
      run: |
        poetry run vulndb nvd ingest
        poetry run vulndb osv ingest
        poetry run poe data_validation_test
    - name: Save Database to Cache
      id: cache-database-if-valid
      uses: actions/cache/save@v4
      with:
        key: ${{ steps.extract_branch.outputs.branch }}.${{ github.sha }}.db
        path: |
          ~/.vulndb/vuln.db
    - name: Upload asset to Release
      uses: softprops/action-gh-release@v2
      if: github.ref == 'refs/heads/main'
      with:
        files: ~/.vulndb/vuln.db